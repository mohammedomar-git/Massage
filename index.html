<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Magic Box | Verified</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
        }

        /* মেইন কার্ড */
        .glass-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 35px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ভেরিফাইড ব্যাজ */
        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .badge {
            background: #f0fdf4;
            color: #16a34a;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #bbf7d0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .github-sec {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
        }

        h2 {
            margin: 0 0 20px 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }

        /* ইনপুট ফিল্ডস */
        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e2e8f0;
            border-radius: 18px;
            box-sizing: border-box;
            background: #f8fafc;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }

        /* গিফট বক্স (Trust Box) */
        .gift-box {
            padding: 30px;
            border: 3px dashed var(--primary);
            border-radius: 25px;
            cursor: pointer;
            background: #fdf2ff;
            transition: 0.4s;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .gift-box:hover { background: #fae8ff; border-style: solid; }

        .gift-icon { font-size: 60px; display: block; margin-bottom: 10px; }

        #output-text {
            background: #fff;
            padding: 15px;
            border-radius: 15px;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            margin: 20px 0;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 15px;
            color: #475569;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="glass-card">
    
    <div class="trust-badges">
        <div class="badge">
            <img src="https://img.icons8.com/fluency/18/verified-badge.png"> ভেরিফাইড টুল
        </div>
        <div class="badge github-sec">
            <img src="https://img.icons8.com/material-outlined/16/github.png"> GitHub Secured
        </div>
    </div>

    <div id="creator-section">
        <h2>ম্যাজিক বোম্বার 🚀</h2>
        <input type="text" id="nameInput" placeholder="আপনার নাম (যেমন: ওমর)">
        <textarea id="msgInput" rows="2" placeholder="আপনার গোপন মেসেজ..."></textarea>
        <input type="number" id="countInput" placeholder="কতবার? (সর্বোচ্চ ৫০০০)" max="5000">
        <button class="btn" onclick="generateMagicLink()">লিঙ্ক তৈরি ও শেয়ার</button>
    </div>

    <div id="gateway-section" class="hidden">
        <div class="gift-box" onclick="handleReveal()">
            <span class="gift-icon">🎁</span>
            <h3 style="margin:0; color:#4a148c;"><span id="senderNameDisplay"></span> আপনার জন্য সারপ্রাইজ পাঠিয়েছেন!</h3>
            <p style="color:#6b7280; font-size:14px; margin-top:10px;">মেসেজটি আনলক করতে বক্সে ক্লিক করুন</p>
        </div>
    </div>

    <div id="reveal-section" class="hidden">
        <h3 id="finalTitle" style="color:#1e293b;"></h3>
        <div id="output-text"></div>
        <button class="btn" onclick="copyResult()">সব টেক্সট কপি করুন</button>
        <p style="margin-top:20px; font-size:14px; color:var(--primary); cursor:pointer; font-weight:bold;" onclick="location.href=window.location.pathname">নিজেও এমন লিঙ্ক বানান ➡️</p>
    </div>

    <footer style="margin-top:25px; font-size:11px; color:#94a3b8; letter-spacing: 1px;">
        🛡️ ভেরিফাইড বাই গিটহাব কমিউনিটি
    </footer>
</div>

<script>
    let finalPayload = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const n = urlParams.get('n'), d = urlParams.get('d'), q = urlParams.get('q');

        if (n && d && q) {
            document.getElementById('creator-section').classList.add('hidden');
            document.getElementById('gateway-section').classList.remove('hidden');
            
            const decodedName = decodeURIComponent(atob(n));
            const decodedMsg = decodeURIComponent(atob(d));
            const count = Math.min(parseInt(q), 5000);
            
            document.getElementById('senderNameDisplay').innerText = decodedName;
            document.getElementById('finalTitle').innerText = decodedName + " এর সারপ্রাইজ মেসেজ";
            finalPayload = new Array(count).fill(decodedMsg).join("\n");
        }
    }

    function generateMagicLink() {
        const name = document.getElementById('nameInput').value;
        const msg = document.getElementById('msgInput').value;
        const count = document.getElementById('countInput').value;

        if(!name || !msg || !count) return alert("ওমর, তথ্যগুলো সঠিকভাবে দিন!");

        const encodedName = btoa(encodeURIComponent(name));
        const encodedMsg = btoa(encodeURIComponent(msg));
        const finalUrl = `${window.location.href.split('?')[0]}?n=${encodedName}&d=${encodedMsg}&q=${count}`;

        if (navigator.share) {
            navigator.share({
                title: 'ম্যাজিক সারপ্রাইজ',
                text: `${name} আপনার জন্য একটি ভেরিফাইড সারপ্রাইজ পাঠিয়েছেন! দেখুন এখানে:`,
                url: finalUrl
            });
        } else {
            navigator.clipboard.writeText(finalUrl);
            alert("লিঙ্কটি কপি করা হয়েছে!");
        }
    }

    function handleReveal() {
        // কনফেটি এনিমেশন
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#8b5cf6', '#d946ef', '#22c55e']
        });

        setTimeout(() => {
            document.getElementById('gateway-section').classList.add('hidden');
            document.getElementById('reveal-section').classList.remove('hidden');
            document.getElementById('output-text').innerText = finalPayload;
        }, 500);
    }

    function copyResult() {
        navigator.clipboard.writeText(finalPayload);
        alert("সবগুলো টেক্সট কপি হয়েছে!");
    }
</script>

</body>
</html>
