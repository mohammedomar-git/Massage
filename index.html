<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise Magic Box | Verified</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            background: #0f172a;
            font-family: 'Hind Siliguri', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1e293b;
            overflow: hidden; /* স্ক্রলবার লুকানোর জন্য */
        }

        /* মেইন কার্ড */
        .glass-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 420px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ফুল স্ক্রিন রিভিল মোড */
        #reveal-section {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .badge {
            background: #f0fdf4;
            color: #16a34a;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #bbf7d0;
        }

        input, textarea {
            width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #e2e8f0; border-radius: 15px;
            box-sizing: border-box; font-size: 16px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; padding: 16px; width: 100%;
            border-radius: 15px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            margin-top: 10px;
        }

        .gift-box {
            padding: 40px 20px; border: 3px dashed var(--primary);
            border-radius: 25px; cursor: pointer; background: #fdf2ff;
            animation: bounce 2s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #output-text {
            flex-grow: 1; /* পুরো জায়গা দখল করবে */
            background: #f8fafc;
            padding: 20px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            margin: 15px 0;
            white-space: pre-wrap;
            border: 1px solid #e2e8f0;
            font-size: 16px;
            line-height: 1.6;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="glass-card" id="main-card">
    
    <div id="creator-section">
        <div class="trust-badges">
            <div class="badge"><img src="https://img.icons8.com/fluency/16/verified-badge.png"> ভেরিফাইড টুল</div>
            <div class="badge" style="background:#f8fafc; color:#334155;"><img src="https://img.icons8.com/material-outlined/16/github.png"> GitHub Secured</div>
        </div>
        <h2>ম্যাজিক বোম্বার 🚀</h2>
        <input type="text" id="nameInput" placeholder="আপনার নাম">
        <textarea id="msgInput" rows="2" placeholder="আপনার মেসেজ..."></textarea>
        <input type="number" id="countInput" placeholder="পরিমাণ (সর্বোচ্চ ৫০০০)">
        <button class="btn" onclick="generateShortLink()">লিঙ্ক তৈরি ও শেয়ার</button>
    </div>

    <div id="gateway-section" class="hidden">
        <div class="trust-badges">
            <div class="badge"><img src="https://img.icons8.com/fluency/16/verified-badge.png"> সিকিউর ভিউ</div>
            <div class="badge" style="background:#f8fafc; color:#334155;"><img src="https://img.icons8.com/material-outlined/16/github.png"> GitHub Verified</div>
        </div>
        <div class="gift-box" onclick="handleReveal()">
            <span style="font-size:60px;">🎁</span>
            <h3><span id="senderNameDisplay" style="color:var(--primary);"></span> এর সারপ্রাইজ মেসেজ!</h3>
            <p style="font-size:14px; color:#64748b;">দেখতে বক্সে ক্লিক করুন</p>
        </div>
    </div>
</div>

<div id="reveal-section">
    <div class="trust-badges">
        <div class="badge" style="background:#e0f2fe; color:#0369a1; border-color:#bae6fd;">
            <img src="https://img.icons8.com/fluency/16/verified-badge.png"> অফিসিয়াল গিটহাব টুল
        </div>
    </div>
    <h3 id="finalTitle" style="text-align:center; margin-top:0;"></h3>
    <div id="output-text"></div>
    <button class="btn" onclick="copyResult()">সব টেক্সট কপি করুন</button>
    <button class="btn" style="background:#64748b; margin-top:5px;" onclick="location.href=window.location.pathname">নিজেও বানান</button>
</div>

<script>
    let finalPayload = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const s = urlParams.get('s'); // 's' for short combined data

        if (s) {
            document.getElementById('creator-section').classList.add('hidden');
            document.getElementById('gateway-section').classList.remove('hidden');
            
            try {
                // একটি মাত্র প্যারামিটার থেকে সব ডেটা ডিকোড করা
                const decodedData = decodeURIComponent(atob(s)).split('|');
                const name = decodedData[0];
                const msg = decodedData[1];
                const count = Math.min(parseInt(decodedData[2]), 5000);
                
                document.getElementById('senderNameDisplay').innerText = name;
                document.getElementById('finalTitle').innerText = name + " এর মেসেজ";
                finalPayload = new Array(count).fill(msg).join("\n");
            } catch(e) { console.log("Invalid Link"); }
        }
    }

    function generateShortLink() {
        const name = document.getElementById('nameInput').value;
        const msg = document.getElementById('msgInput').value;
        const count = document.getElementById('countInput').value;

        if(!name || !msg || !count) return alert("সব তথ্য দিন ওমর!");

        // ৩টি ডেটাকে ১টি স্ট্রিং এ রূপান্তর করে ছোট করা
        const combined = `${name}|${msg}|${count}`;
        const encoded = btoa(encodeURIComponent(combined));
        const finalUrl = `${window.location.href.split('?')[0]}?s=${encoded}`;

        if (navigator.share) {
            navigator.share({
                title: 'Surprise',
                text: `${name} আপনার জন্য সারপ্রাইজ পাঠিয়েছেন!`,
                url: finalUrl
            });
        } else {
            navigator.clipboard.writeText(finalUrl);
            alert("লিঙ্ক কপি হয়েছে!");
        }
    }

    function handleReveal() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('reveal-section').style.display = 'flex';
        document.getElementById('output-text').innerText = finalPayload;
    }

    function copyResult() {
        navigator.clipboard.writeText(finalPayload);
        alert("সব কপি হয়েছে!");
    }
</script>

</body>
</html>
